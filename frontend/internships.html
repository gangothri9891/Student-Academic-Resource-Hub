<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Internships</title>

    <link rel="stylesheet" href="../css/dashboard.css">

</head>

<body>

    <!-- Navbar -->

    <nav>

        <h2>💼 Internship Opportunities</h2>

        <a href="dashboard.html">
            <button>⬅ Dashboard</button>
        </a>

    </nav>

    <!-- Heading -->

    <section class="welcome">

        <h1>Latest Internships</h1>

        <p>

            Search and explore internship opportunities from trusted companies.

        </p>

    </section>

    <!-- Search -->

    <section class="search-section">

        <input
            type="text"
            id="searchInternship"
            placeholder="Search by company, role or location"
        >

        <button id="searchBtn">

            Search

        </button>

    </section>

    <!-- Internship Cards -->

    <section
        class="cards"
        id="internshipContainer">

        <!-- Internship cards will load here -->

    </section>

    <script src="../js/internships.js"></script>

</body>

</html>
