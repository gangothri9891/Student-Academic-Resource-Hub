<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Bookmarks</title>

    <link rel="stylesheet" href="../css/dashboard.css">

</head>

<body>

    <!-- Navbar -->

    <nav>

        <h2>📌 My Bookmarks</h2>

        <a href="dashboard.html">
            <button>⬅ Dashboard</button>
        </a>

    </nav>

    <!-- Heading -->

    <section class="welcome">

        <h1>Saved Academic Resources ⭐</h1>

        <p>

            Search, open and manage your bookmarked resources.

        </p>

    </section>

    <!-- Search -->

    <section class="search-section">

        <input

            type="text"

            id="searchBookmark"

            placeholder="Search by title or category"

        >

        <button id="searchBtn">

            Search

        </button>

    </section>

    <!-- Bookmarks -->

    <section

        class="cards"

        id="bookmarkContainer">

        <!-- Data will be loaded here from MySQL -->

    </section>

    <script src="../js/bookmarks.js"></script>

</body>

</html>
