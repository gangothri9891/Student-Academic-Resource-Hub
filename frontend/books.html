<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Books</title>

    <link rel="stylesheet" href="../css/dashboard.css">
</head>
<body>

    <!-- Navbar -->
    <nav>
        <h2>Recommended Books</h2>

        <a href="dashboard.html">
            <button>Dashboard</button>
        </a>
    </nav>

    <!-- Heading -->
    <section class="welcome">

        <h1>Books Library</h1>

        <p>Search and explore recommended books for every subject.</p>

    </section>

    <!-- Search -->

        <input
            type="text"
            id="searchBook"
            placeholder="Search Book..."

        <button id="searchBtn">
            Search
        </button>

    </section>

    <!-- Book Cards -->
    <section
        class="cards"
        id="bookContainer">

    </section>

    <script src="../js/books.js"></script>

</body>
</html>
